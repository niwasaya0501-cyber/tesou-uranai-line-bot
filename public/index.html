<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>手相占い</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main id="app">
    <h1>手相占い</h1>

    <section id="step-worry">
      <p>今、気になっていることは？</p>
      <div id="worry-buttons" class="worry-list">
        <button type="button" class="worry-btn" data-worry="love">恋愛</button>
        <button type="button" class="worry-btn" data-worry="work">仕事</button>
        <button type="button" class="worry-btn" data-worry="relationship">人間関係</button>
        <button type="button" class="worry-btn" data-worry="self">自己分析</button>
        <button type="button" class="worry-btn" data-worry="other">その他</button>
      </div>

      <div id="other-worry-form" class="hidden">
        <p class="photo-slot-label">気になっていることを入力してください</p>
        <input type="text" id="other-worry-text" maxlength="40" placeholder="例：転職について" />
        <button type="button" id="other-worry-submit">次へ</button>
        <button type="button" id="other-worry-back">戻る</button>
      </div>
    </section>

    <section id="step-photo" class="hidden">
      <p>選んだ悩み：<span id="selected-worry"></span></p>
      <p>手のひら全体が写る写真を選んでください。<br />両手の写真を送ると、より詳しく鑑定できます（片手だけでも占えます）。</p>

      <div class="photo-slot">
        <p class="photo-slot-label">1枚目（必須）</p>
        <input type="file" id="photo-input-1" accept="image/*" />
        <img id="preview-1" class="hidden" alt="1枚目のプレビュー" />
      </div>

      <div class="photo-slot">
        <p class="photo-slot-label">2枚目（任意・もう片方の手）</p>
        <input type="file" id="photo-input-2" accept="image/*" />
        <img id="preview-2" class="hidden" alt="2枚目のプレビュー" />
      </div>

      <button type="button" id="submit-btn" disabled>この写真で占う</button>
    </section>

    <section id="step-loading" class="hidden">
      <p>鑑定中です…（10〜20秒ほどお待ちください）</p>
    </section>

    <section id="step-done" class="hidden">
      <p>結果をLINEのトークに送りました！</p>
      <button type="button" id="close-btn">閉じる</button>
    </section>

    <section id="step-error" class="hidden">
      <p id="error-message">エラーが発生しました。もう一度お試しください。</p>
      <button type="button" id="retry-btn">やり直す</button>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
